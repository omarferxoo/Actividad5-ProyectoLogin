<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Actividad 5 | Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/login.css">
</head>

<body class="login-page">
  <main class="login-shell">
    <section class="login-card">
      <div class="login-brand">
        <img src="img/logoportada.png" alt="Logo del Instituto Tecnologico de Oaxaca">
        <div>
          <p class="eyebrow">Programacion Web</p>
          <h1>Acceso al sistema</h1>
        </div>
      </div>

      <form id="loginForm" class="needs-validation" novalidate>
        <div class="mb-3">
          <label for="correoLogin" class="form-label">Correo electronico</label>
          <input type="email" class="form-control" id="correoLogin" placeholder="alumno@itoaxaca.edu.mx" required>
          <div class="invalid-feedback">Ingresa un correo electronico valido.</div>
        </div>

        <div class="mb-3">
          <label for="passwordLogin" class="form-label">Contrasena</label>
          <input type="password" class="form-control" id="passwordLogin" placeholder="Minimo 8 caracteres" required>
          <div class="invalid-feedback">La contrasena debe tener minimo 8 caracteres, una mayuscula, una minuscula y un
            numero.</div>
        </div>

        <div id="loginAlert" class="alert alert-danger d-none" role="alert"></div>

        <button class="btn btn-primary w-100" type="submit">Entrar</button>
      </form>
    </section>
  </main>

  <script src="js/utileria.js"></script>
  <script src="js/login.js"></script>
</body>

</html>
